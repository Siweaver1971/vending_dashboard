<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vended — Vending Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="topbar-root"></div>
<main>
  <h1>Vended</h1>
  <p class="subtitle">Raw vending-machine issue transactions — matches the original per-site "Vended" sheet. Tick sites/periods/cost centres below, like the workbook's slicers.</p>

  <div class="slicer-row" id="slicer-row"></div>
  <div style="margin-bottom:20px;"><button type="button" id="apply-btn">Apply</button></div>

  <div class="card">
    <h2>Results</h2>
    <div id="result-body"><p class="loading">Loading…</p></div>
  </div>
</main>

<script type="module">
import { supabase, renderNav, money, buildCsv, downloadCsv } from './layout.js';
import { renderSlicer } from './slicer.js';

renderNav('vended');

const slicerRow = document.getElementById('slicer-row');
const resultBody = document.getElementById('result-body');
let currentRows = [];

let siteSlicer, groupSlicer, periodSlicer, ccSlicer, pgSlicer;

async function buildSlicers() {
  const [{ data: groups }, { data: periods }, { data: ccNames }, { data: pgNames }] = await Promise.all([
    supabase.from('jde_groups').select('group_name, sites(site_name)').order('group_name'),
    supabase.rpc('get_vended_periods'),
    supabase.rpc('get_cost_centre_names', { p_site_name: null }),
    supabase.rpc('get_product_groups'),
  ]);

  const siteNames = Array.from(new Set((groups || []).map((g) => g.sites.site_name))).sort();
  const groupNames = (groups || []).map((g) => g.group_name);
  const periodOpts = (periods || []).map((p) => [p.period_key, p.period_label]);
  const ccOpts = (ccNames || []).map((r) => r.cost_centre_name);
  const pgOpts = (pgNames || []).map((r) => r.product_group);

  slicerRow.innerHTML = '';
  siteSlicer = renderSlicer(slicerRow, { label: 'Site', options: siteNames, selected: [] });
  groupSlicer = renderSlicer(slicerRow, { label: 'Recharge Group', options: groupNames, selected: [] });
  periodSlicer = renderSlicer(slicerRow, { label: 'Period', options: periodOpts, selected: [] });
  ccSlicer = renderSlicer(slicerRow, { label: 'Cost Centre', options: ccOpts, selected: [] });
  pgSlicer = renderSlicer(slicerRow, { label: 'Product Group', options: pgOpts, selected: [] });
}

function toNullIfEmpty(arr) {
  return arr && arr.length ? arr : null;
}

async function runQuery() {
  resultBody.innerHTML = '<p class="loading">Loading…</p>';

  const { data, error } = await supabase.rpc('get_vended_detail', {
    p_sites: toNullIfEmpty(siteSlicer.getSelected()),
    p_groups: toNullIfEmpty(groupSlicer.getSelected()),
    p_periods: toNullIfEmpty(periodSlicer.getSelected()),
    p_cost_centres: toNullIfEmpty(ccSlicer.getSelected()),
    p_product_groups: toNullIfEmpty(pgSlicer.getSelected()),
  });

  if (error) {
    resultBody.innerHTML = `<p class="empty">Error: ${error.message}</p>`;
    currentRows = [];
    return;
  }

  currentRows = data || [];
  const n = currentRows.length;
  const total = currentRows.reduce((sum, r) => sum + Number(r.total_value || 0), 0);
  const shown = currentRows.slice(0, 500);

  if (n === 0) {
    resultBody.innerHTML = '<p class="empty">No transactions match these filters.</p>';
    return;
  }

  const rowsHtml = shown.map((r) => `
    <tr>
      <td>${r.txn_date}</td>
      <td>${esc(r.site_name)}</td>
      <td>${esc(r.group_name)}</td>
      <td>${esc(r.cost_centre_name)}</td>
      <td>${esc(r.item_code)}</td>
      <td>${esc(r.description || '')}</td>
      <td>${esc(r.product_group || '')}</td>
      <td class="num">${money(r.quantity)}</td>
      <td class="num">£${money(r.unit_cost)}</td>
      <td class="num">£${money(r.total_value)}</td>
      <td>${esc(r.employee_name || '')}</td>
      <td>${esc([r.crib_area, r.crib, r.crib_bin].filter(Boolean).join(' '))}</td>
    </tr>`).join('');

  resultBody.innerHTML = `
    <p class="basis">
      ${n.toLocaleString()} transaction${n === 1 ? '' : 's'} matching these filters, total value £${money(total)}
      ${n > 500 ? ' — showing the most recent 500 below, download CSV for the full set (up to 20,000 rows).' : '.'}
    </p>
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Site</th><th>Group</th><th>Cost Centre</th><th>Item</th><th>Description</th>
          <th>Product Group</th><th class="num">Qty</th><th class="num">Unit Cost</th><th class="num">Total</th>
          <th>Employee</th><th>Crib</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <button type="button" class="download-link" id="download-btn">Download CSV (up to 20,000 rows)</button>
  `;
  document.getElementById('download-btn').addEventListener('click', downloadVendedCsv);
}

function downloadVendedCsv() {
  const headers = ['Date','Time','Site','Group','Cost Centre','Item Code','Description','Product Group','Quantity','Unit Cost','Total Value','Employee','Crib Area','Crib','Bin'];
  const rows = currentRows.map((r) => [
    r.txn_date, r.txn_time, r.site_name, r.group_name, r.cost_centre_name, r.item_code,
    r.description, r.product_group, r.quantity, r.unit_cost, r.total_value,
    r.employee_name, r.crib_area, r.crib, r.crib_bin,
  ]);
  downloadCsv('vended_export.csv', buildCsv(headers, rows));
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

document.getElementById('apply-btn').addEventListener('click', runQuery);

(async () => {
  await buildSlicers();
  await runQuery();
})();
</script>
</body>
</html>
