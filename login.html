<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in — Vending Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div class="login-wrap">
    <h1 style="text-align:center;">Vending Dashboard</h1>
    <div class="card">
      <h2>Log in</h2>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
        <button type="submit">Log in</button>
      </form>
      <p class="login-error" id="login-error" style="display:none;"></p>
    </div>
  </div>
</main>

<script type="module">
import { supabase } from './layout.js';

// If already logged in, skip straight to the dashboard.
supabase.auth.getSession().then(({ data }) => {
  if (data && data.session) window.location.href = 'index.html';
});

const form = document.getElementById('login-form');
const errorEl = document.getElementById('login-error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const submitBtn = form.querySelector('button');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Logging in…';

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = error.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : error.message;
    errorEl.style.display = '';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Log in';
    return;
  }

  window.location.href = 'index.html';
});
</script>
</body>
</html>
